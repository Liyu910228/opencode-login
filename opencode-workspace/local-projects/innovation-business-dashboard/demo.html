<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>创新业务看板</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: "PingFang SC", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #F7F7F8; color: #0B0D0F; max-width: 430px; margin: 0 auto; min-height: 100vh; overflow-x: hidden; }

/* Nav Bar */
.nav-bar { height: 44px; display: flex; align-items: center; justify-content: center; background: #fff; border-bottom: 1px solid #F0F0F0; position: sticky; top: 0; z-index: 100; }
.nav-bar h1 { font-size: 17px; font-weight: 500; color: #0B0D0F; }

/* Primary Tabs */
.primary-tabs { display: flex; height: 44px; background: #fff; border-bottom: 1px solid #F0F0F0; position: sticky; top: 44px; z-index: 99; }
.primary-tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 16px; font-weight: 400; color: #0B0D0F; cursor: pointer; position: relative; transition: color 0.2s; }
.primary-tab.active { color: #0073E5; font-weight: 500; }
.primary-tab.active::after { content: ''; position: absolute; bottom: 0; width: 24px; height: 2px; background: #0073E5; border-radius: 1px; }

/* Banner Capsule Tabs */
.banner-capsules { display: flex; gap: 8px; margin-top: 20px; }
.banner-capsule { flex: 1; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 999px; font-size: 14px; cursor: pointer; transition: all 0.2s; }
.banner-capsule.active { background: #fff; color: #0073E5; font-weight: 500; }
.banner-capsule:not(.active) { background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.25); backdrop-filter: blur(4px); }

/* Dashboard Hero */
.dashboard-hero { position: relative; overflow: visible; }
.dashboard-hero-bg { position: absolute; inset: 0 auto auto 0; width: 100%; height: auto; display: block; z-index: 0; }
.dashboard-hero-content { position: relative; z-index: 1; padding: 32px 16px 0; }
.hero-title-row { display: flex; justify-content: space-between; align-items: flex-start; }
.hero-title { font-size: 20px; font-weight: 500; color: #fff; text-shadow: 0 1px 4px rgba(0,0,0,0.3); }
.hero-time { font-size: 12px; color: rgba(255,255,255,0.85); margin-top: 8px; text-shadow: 0 1px 2px rgba(0,0,0,0.2); }

/* Floating Nav Button */
.floating-nav-btn { height: 32px; padding: 0 14px; border-radius: 999px; background: rgba(255,255,255,0.2); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.35); color: #fff; font-size: 14px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 4px; transition: background 0.2s; flex-shrink: 0; }
.floating-nav-btn:active { background: rgba(255,255,255,0.35); }
.floating-nav-btn svg { width: 14px; height: 14px; fill: #fff; }

/* Side Drawer */
.side-drawer-mask { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; }
.side-drawer-mask.show { display: block; }
.side-drawer { position: fixed; top: 0; right: -260px; width: 260px; height: 100%; background: #fff; z-index: 201; transition: right 0.3s ease; padding: 60px 0 0; overflow-y: auto; }
.side-drawer.open { right: 0; }
.side-drawer-title { padding: 16px; font-size: 15px; font-weight: 500; color: #0B0D0F; border-bottom: 1px solid #F0F0F0; }
.side-drawer-item { padding: 14px 16px; font-size: 15px; color: #576675; cursor: pointer; border-bottom: 1px solid #F0F0F0; transition: background 0.15s; }
.side-drawer-item:active { background: #F7F7F8; }
.side-drawer-item.active { color: #0073E5; font-weight: 500; background: #E6F2FF; }

/* Cards */
.dashboard-card { background: #fff; border-radius: 8px; margin: 20px 16px 0; padding: 16px; }
.dashboard-card--first { margin: 20px 0 0; }
.card-title { font-size: 15px; font-weight: 500; color: #0B0D0F; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.card-title .icon { width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #fff; }

/* Summary Card */
.summary-main { display: flex; align-items: baseline; gap: 8px; margin-bottom: 8px; }
.summary-value { font-size: 28px; font-weight: 600; color: #0B0D0F; font-family: "DIN Alternate", "Helvetica Neue", Arial, sans-serif; }
.summary-unit { font-size: 14px; color: #8A99A8; }
.summary-row { display: flex; gap: 16px; }
.summary-item { display: flex; flex-direction: column; gap: 2px; }
.summary-label { font-size: 12px; color: #8A99A8; }
.summary-change { font-size: 16px; font-weight: 500; font-family: "DIN Alternate", "Helvetica Neue", Arial, sans-serif; }
.summary-change.up { color: #2EB82E; }
.summary-change.down { color: #F53D3D; }
.summary-change.flat { color: #8A99A8; }

/* Category Summary */
.cat-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
.cat-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #F7F7F8; border-radius: 8px; }
.cat-name { font-size: 14px; font-weight: 500; color: #0B0D0F; min-width: 72px; }
.cat-metrics { display: flex; gap: 12px; flex: 1; justify-content: flex-end; }
.cat-metric { text-align: right; min-width: 56px; }
.cat-metric-label { font-size: 11px; color: #8A99A8; }
.cat-metric-value { font-size: 14px; font-weight: 500; color: #0B0D0F; font-family: "DIN Alternate", "Helvetica Neue", Arial, sans-serif; }
.cat-metric-value.up { color: #2EB82E; }
.cat-metric-value.down { color: #F53D3D; }
.cat-metric-value.flat { color: #8A99A8; }

/* Org Dimension Tabs */
.org-dim-wrap { padding: 0 16px; margin-top: 20px; }
.org-dim { display: flex; height: 34px; border: 1px solid #0073E5; border-radius: 4px; overflow: hidden; }
.org-dim-item { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 14px; color: #0073E5; cursor: pointer; }
.org-dim-item.active { background: #0073E5; color: #fff; font-weight: 500; }

/* Table */
.table-card { background: #fff; border-radius: 8px; margin: 12px 16px 20px; overflow: hidden; }
.table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
.table-scroll::-webkit-scrollbar { display: none; }
table { width: max-content; min-width: 100%; border-collapse: collapse; }
thead th { background: #E6F2FF; color: #576675; font-size: 12px; font-weight: 400; padding: 10px 12px; white-space: nowrap; text-align: center; border-bottom: 1px solid #F0F0F0; position: sticky; top: 0; z-index: 1; }
thead th:first-child { text-align: left; position: sticky; left: 0; z-index: 2; background: #E6F2FF; min-width: 110px; }
tbody td { padding: 12px; font-size: 14px; color: #0B0D0F; border-bottom: 1px solid #F0F0F0; white-space: nowrap; text-align: right; font-family: "DIN Alternate", "Helvetica Neue", Arial, sans-serif; }
tbody td:first-child { text-align: left; position: sticky; left: 0; background: #fff; z-index: 1; font-family: "PingFang SC", sans-serif; min-width: 110px; }
tbody tr { cursor: pointer; transition: background 0.15s; }
tbody tr:active { background: #F7F7F8; }
tbody tr:last-child td { border-bottom: none; }
.rank-badge { display: inline-flex; align-items: center; justify-content: center; width: 20px; height: 20px; border-radius: 50%; font-size: 11px; font-weight: 600; margin-right: 6px; vertical-align: middle; }
.rank-1 { background: #FF8C1A; color: #fff; }
.rank-2 { background: #0073E5; color: #fff; }
.rank-3 { background: #8A99A8; color: #fff; }
.rank-n { background: transparent; color: #8A99A8; font-weight: 400; }
td .up { color: #2EB82E; }
td .down { color: #F53D3D; }
td .flat { color: #8A99A8; }
.drill-arrow { color: #C4CCD4; font-size: 12px; margin-left: 4px; }

/* Bottom Sheet */
.sheet-mask { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 300; }
.sheet-mask.show { display: block; }
.bottom-sheet { position: fixed; bottom: -100%; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: #fff; border-radius: 8px 8px 0 0; z-index: 301; transition: bottom 0.3s ease; max-height: 70vh; display: flex; flex-direction: column; }
.bottom-sheet.open { bottom: 0; }
.sheet-handle { width: 36px; height: 4px; background: #E3E5E8; border-radius: 2px; margin: 12px auto 0; }
.sheet-header { padding: 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #F0F0F0; }
.sheet-title { font-size: 16px; font-weight: 500; color: #0B0D0F; }
.sheet-close { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-size: 18px; color: #8A99A8; cursor: pointer; border-radius: 50%; }
.sheet-close:active { background: #F7F7F8; }
.sheet-body { flex: 1; overflow-y: auto; padding: 0 0 20px; }
.sheet-body table { width: 100%; min-width: auto; }
.sheet-body thead th { background: #E6F2FF; position: sticky; top: 0; }
.sheet-body thead th:first-child { position: sticky; left: 0; }
.sheet-body tbody td:first-child { position: sticky; left: 0; background: #fff; }

/* Empty State */
.empty-state { text-align: center; padding: 40px 16px; color: #8A99A8; font-size: 14px; }

/* Responsive */
@media (max-width: 374px) {
  .cat-metrics { gap: 8px; }
}
</style>

function fmt(n) { return n.toLocaleString(); }
function calcChange(cur, last) { return cur - last; }
function calcRate(cur, last) {
  if (last === 0) return '-';
  return ((cur - last) / last * 100).toFixed(1) + '%';
}
function changeClass(cur, last) {
  const d = cur - last;
  if (d > 0) return 'up';
  if (d < 0) return 'down';
  return 'flat';
}
function changeText(cur, last) {
  const d = cur - last;
  if (d > 0) return '+' + fmt(d);
  if (d < 0) return fmt(d);
  return '0';
}
function getTimeLabel() {
  const labels = { day: '2026年7月1日', month: '2026年7月', year: '2026年' };
  return labels[state.timeDim];
}
function getRankBadge(i) {
  if (i === 0) return '<span class="rank-badge rank-1">1</span>';
  if (i === 1) return '<span class="rank-badge rank-2">2</span>';
  if (i === 2) return '<span class="rank-badge rank-3">3</span>';
  return '<span class="rank-badge rank-n">' + (i + 1) + '</span>';
}

function getThemeTitle() {
  const data = DATA[state.primaryTab];
  const current = data.themes.find(t => t.key === state.theme);
  return current ? current.label : data.label;
}

function openDrawer() {
  const mask = document.getElementById('drawerMask');
  const drawer = document.getElementById('sideDrawer');
  const title = document.getElementById('drawerTitle');
  const items = document.getElementById('drawerItems');
  const data = DATA[state.primaryTab];
  title.textContent = '选择主题看板';
  items.innerHTML = '';
  data.themes.forEach(t => {
    const item = document.createElement('div');
    item.className = 'side-drawer-item' + (state.theme === t.key ? ' active' : '');
    item.textContent = t.label;
    item.onclick = () => { state.theme = t.key; closeDrawer(); render(); };
    items.appendChild(item);
  });
  mask.classList.add('show');
  drawer.classList.add('open');
}
function closeDrawer() {
  document.getElementById('drawerMask').classList.remove('show');
  document.getElementById('sideDrawer').classList.remove('open');
}

  firstCardHtml += '<div class="dashboard-card dashboard-card--first">';
  firstCardHtml += '<div class="card-title"><span class="icon" style="background:#0073E5">&#x1F4CA;</span>全国' + data.label + '汇总</div>';
  firstCardHtml += '<div class="summary-main"><span class="summary-value">' + fmt(totalCur) + '</span><span class="summary-unit">KL</span></div>';
  firstCardHtml += '<div class="summary-row">';
  firstCardHtml += '<div class="summary-item"><span class="summary-label">当期</span><span style="font-size:14px;font-weight:500;color:#0B0D0F">' + fmt(totalCur) + ' KL</span></div>';
  firstCardHtml += '<div class="summary-item"><span class="summary-label">同期</span><span style="font-size:14px;font-weight:500;color:#0B0D0F">' + fmt(totalLast) + ' KL</span></div>';
  firstCardHtml += '<div class="summary-item"><span class="summary-label">同比增减</span><span class="summary-change ' + changeClass(totalCur, totalLast) + '">' + changeText(totalCur, totalLast) + '</span></div>';
  firstCardHtml += '<div class="summary-item"><span class="summary-label">同比增幅</span><span class="summary-change ' + changeClass(totalCur, totalLast) + '">' + calcRate(totalCur, totalLast) + '</span></div>';
  firstCardHtml += '</div></div>';
  heroFirstCard.innerHTML = firstCardHtml;

  // Main content
  let html = '';

  // Category Summary (only for overall theme or summary themes)
  if (isOverallTheme || state.theme.endsWith('_summary') || (data.themes.length > 1 && state.theme === data.themes[0].key)) {
    html += '<div class="dashboard-card">';
    html += '<div class="card-title"><span class="icon" style="background:#FF8C1A">&#x1F4C8;</span>分类明细</div>';
    html += '<div class="cat-grid">';
    data.categories.forEach(c => {
      html += '<div class="cat-item">';
      html += '<span class="cat-name">' + c.name + '</span>';
      html += '<div class="cat-metrics">';
      html += '<div class="cat-metric"><div class="cat-metric-label">当期</div><div class="cat-metric-value">' + fmt(c.current) + '</div></div>';
      html += '<div class="cat-metric"><div class="cat-metric-label">同期</div><div class="cat-metric-value">' + fmt(c.lastYear) + '</div></div>';
      html += '<div class="cat-metric"><div class="cat-metric-label">同比增减</div><div class="cat-metric-value ' + changeClass(c.current, c.lastYear) + '">' + changeText(c.current, c.lastYear) + '</div></div>';
      html += '<div class="cat-metric"><div class="cat-metric-label">同比增幅</div><div class="cat-metric-value ' + changeClass(c.current, c.lastYear) + '">' + calcRate(c.current, c.lastYear) + '</div></div>';
      html += '</div></div>';
    });
    html += '</div></div>';
  }

  // Org Dimension + Table
  const rankData = state.orgDim === 'bizUnit' ? data.bizUnitRank : data.mktCenterRank;
  html += '<div class="org-dim-wrap">';
  html += '<div class="org-dim" id="orgDim">';
  html += '<div class="org-dim-item' + (state.orgDim === 'bizUnit' ? ' active' : '') + '" data-dim="bizUnit">事业部</div>';
  html += '<div class="org-dim-item' + (state.orgDim === 'mktCenter' ? ' active' : '') + '" data-dim="mktCenter">营销中心</div>';
  html += '</div></div>';

  html += '<div class="table-card"><div class="table-scroll"><table>';
  html += '<thead><tr><th>排名 / 组织</th><th>当期(KL)</th><th>同期(KL)</th><th>同比增减</th><th>同比增幅</th></tr></thead>';
  html += '<tbody>';
  rankData.forEach((r, i) => {
    html += '<tr data-org="' + r.name + '">';
    html += '<td>' + getRankBadge(i) + r.name + '<span class="drill-arrow">&#x203A;</span></td>';
    html += '<td>' + fmt(r.current) + '</td>';
    html += '<td>' + fmt(r.lastYear) + '</td>';
    html += '<td class="' + changeClass(r.current, r.lastYear) + '">' + changeText(r.current, r.lastYear) + '</td>';
    html += '<td class="' + changeClass(r.current, r.lastYear) + '">' + calcRate(r.current, r.lastYear) + '</td>';
    html += '</tr>';
  });
  html += '</tbody></table></div></div>';

  main.innerHTML = html;

  // Bind org dim
  document.querySelectorAll('#orgDim .org-dim-item').forEach(el => {
    el.onclick = () => { state.orgDim = el.dataset.dim; renderContent(); };
  });

  // Bind drill
  document.querySelectorAll('.table-card tbody tr').forEach(tr => {
    tr.onclick = () => openDrill(tr.dataset.org);
  });
}

function openDrill(orgName) {
  const data = DATA[state.primaryTab];
  const drillList = data.drillData[orgName];
  const mask = document.getElementById('sheetMask');
  const sheet = document.getElementById('bottomSheet');
  const title = document.getElementById('sheetTitle');
  const body = document.getElementById('sheetBody');

  title.textContent = orgName + ' \u2192 下级排名';

  if (!drillList || drillList.length === 0) {
    body.innerHTML = '<div class="empty-state">暂无下级数据</div>';
  } else {
    let html = '<table><thead><tr><th>排名 / 组织</th><th>当期(KL)</th><th>同期(KL)</th><th>同比增减</th><th>同比增幅</th></tr></thead><tbody>';
    drillList.forEach((r, i) => {
      html += '<tr>';
      html += '<td>' + getRankBadge(i) + r.name + '</td>';
      html += '<td>' + fmt(r.current) + '</td>';
      html += '<td>' + fmt(r.lastYear) + '</td>';
      html += '<td class="' + changeClass(r.current, r.lastYear) + '">' + changeText(r.current, r.lastYear) + '</td>';
      html += '<td class="' + changeClass(r.current, r.lastYear) + '">' + calcRate(r.current, r.lastYear) + '</td>';
      html += '</tr>';
    });
    html += '</tbody></table>';
    body.innerHTML = html;
  }

  mask.classList.add('show');
  sheet.classList.add('open');
}
function closeSheet() {
  document.getElementById('sheetMask').classList.remove('show');
  document.getElementById('bottomSheet').classList.remove('open');
}
document.getElementById('sheetMask').onclick = closeSheet;
document.getElementById('sheetClose').onclick = closeSheet;

function render() {
  document.getElementById('heroTitle').textContent = getThemeTitle();
  document.getElementById('heroTime').textContent = getTimeLabel();
  // Sync capsule active state
  document.querySelectorAll('.banner-capsule').forEach(c => {
    c.classList.toggle('active', c.dataset.time === state.timeDim);
  });
  renderContent();
}

// Primary tabs
document.querySelectorAll('.primary-tab').forEach(tab => {
  tab.onclick = () => {
    document.querySelectorAll('.primary-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    state.primaryTab = tab.dataset.tab;
    state.theme = DATA[state.primaryTab].themes[0].key;
    state.orgDim = 'bizUnit';
    render();
  };
});

// Banner capsules (time dimension)
document.querySelectorAll('.banner-capsule').forEach(item => {
  item.onclick = () => {
    document.querySelectorAll('.banner-capsule').forEach(i => i.classList.remove('active'));
    item.classList.add('active');
    state.timeDim = item.dataset.time;
    render();
  };
});

render();
</script>
</body>
</html>
